{% extends 'shemuapp/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <h2>Shemu</h2>
            <p class="text-muted">Change Password</p>
        </div>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        
        <div class="card">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">Change Password</h4>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password1" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="new_password2" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-teal w-100 mb-2">Confirm</button>
                </form>
                
                <a href="{% url 'manage_account' pk=pk %}" class="btn btn-secondary w-100">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
