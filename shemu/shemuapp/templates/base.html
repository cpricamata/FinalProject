<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shemu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #E8F5F3;
        }

        .navbar {
            background-color: #2C3E7B;
            padding: 10px 0;
        }

        .navbar-brand {
            color: #2DD4BF;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-link {
            color: white;
            margin: 0 10px;
        }

        .nav-link:hover {
            color: #2DD4BF;
        }

        .content-box{
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
        }

        h2 {
            color: #2C3E7B;
        }

        .btn-teal {
            background-color: #2DD4BF;
            border: none;
            color: white;
        }

        .btn-teal:hover {
            background-color: #14B8A6;
            color: white;
        }

        .btn-purple {
            background-color: #7C3AED;
            border: none;
            color: white;
        }

        .btn-purple:hover {
            background-color: #6D28D9;
            color: white;
        }
        
        .table thead {
            background-color: #2C3E7B;
            color: white;
        }

        footer {
            background-color: #2C3E7B;
            color: white;
            padding: 15px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            {% if current_user %}
            <a class="navbar-brand" href="{% url 'employees' pk=pk %}">Shemu</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'employees' pk=pk %}">Employees</a>
                <a class="nav-link" href="{% url 'payslips' pk=pk %}">Payslips</a>
                <a class="nav-link" href="{% url 'about_us' %}">About Us</a>

                {% if current_user %}
                <a class="nav-link" href="{% url 'manage_account' pk=pk %}">Manage Account</a>
                <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                {% endif %}
            </div>
            {% else %}
            <a class="navbar-brand" href="{% url 'login' %}">Shemu</a>
            <div class="navbar-nav"></div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        <div class="content-box">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 Shemu</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
