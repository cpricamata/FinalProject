{% extends 'base.html' %}


{% block content %}
<div class="container mt-4">

    <!-- header -->
    <div class="row mb-2 text-center">
        <div class="pb-2">
            <h2>Create Employee</h2>
        </div>
        <hr>
    </div>
    {% if error %}
    <div style="
        background-color: #f8d7da; 
        color: #721c24; 
        padding: 10px; 
        border: 1px solid #f5c6cb; 
        border-radius: 5px; 
        margin-bottom: 15px;
        text-align: center;">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}
    <!-- form -->
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 border p-4 shadow-sm rounded">

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="text-dark fs-6 mb-1">Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="text-dark fs-6 mb-1">ID Number:</label>
                    <input type="text" name="id_number" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="text-dark fs-6 mb-1">Rate</label>
                    <input type="number" name="rate" min="1" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="text-dark fs-6 mb-1">Allowance (optional)</label>
                    <input type="number" min="0" name="allowance" class="form-control">
                </div>


                <button type="submit" class="btn btn-primary w-100 mb-2">
                    Submit
                </button>


            </form>

        </div>
    </div>
</div>

{% endblock %}
